# fly.toml app configuration file generated for watc-backend
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "watc-backend"
primary_region = "cdg"  # Paris region, change if needed

[build]
  [build.args]
    MAVEN_VERSION = "3.9.6"

[env]
  PORT = "8080"
  SPRING_PROFILES_ACTIVE = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    timeout = "10s"
    path = "/actuator/health"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Environment variables (secrets should be set via `fly secrets set`)
# fly secrets set DATABASE_URL="jdbc:postgresql://..."
# fly secrets set DATABASE_USERNAME="postgres"
# fly secrets set DATABASE_PASSWORD="your-password"
# fly secrets set GEMINI_API_KEY="your-api-key"
# fly secrets set JWT_SECRET="your-jwt-secret"
# fly secrets set CORS_ALLOWED_ORIGINS="https://your-frontend-domain.com"
